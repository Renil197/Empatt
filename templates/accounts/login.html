<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Empatt</title>
    <meta name="description" content="Sign in to Empatt – Premium Employee Attendance & Task Management">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ── Variables ── */
        :root {
            --primary:      #10B981;
            --primary-dark: #059669;
            --success:      #22C55E;
            --bg:           #F0FDF4;
            --card:         #FFFFFF;
            --text:         #1F2937;
            --text-muted:   #6B7280;
            --text-light:   #9CA3AF;
            --border:       rgba(16,185,129,0.15);
            --glow:         rgba(16,185,129,0.22);
            --glow-strong:  rgba(16,185,129,0.40);
            --ease-spring:  cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-out:     cubic-bezier(0, 0, 0.2, 1);
        }

        /* ── Base ── */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated BG ── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 40%, #A7F3D0 70%, #6EE7B7 100%);
            overflow: hidden;
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.55;
            animation: orb-drift 10s ease-in-out infinite;
        }
        .bg-orb-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, #10B981 0%, transparent 65%);
            top: -120px; left: -120px;
            animation-delay: 0s;
        }
        .bg-orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #059669 0%, transparent 65%);
            bottom: -80px; right: -80px;
            animation-delay: -3s;
        }
        .bg-orb-3 {
            width: 260px; height: 260px;
            background: radial-gradient(circle, #34D399 0%, transparent 65%);
            top: 40%; left: 60%;
            animation-delay: -6s;
            opacity: 0.35;
        }
        @keyframes orb-drift {
            0%, 100% { transform: translate(0,0) scale(1); }
            33%       { transform: translate(30px,-25px) scale(1.06); }
            66%       { transform: translate(-20px,20px) scale(0.96); }
        }

        /* Grid dots */
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(16,185,129,0.18) 1px, transparent 1px);
            background-size: 36px 36px;
            opacity: 0.6;
        }

        /* ── Loader ── */
        #login-loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: linear-gradient(135deg, #064E3B 0%, #065F46 50%, #10B981 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.65s ease, transform 0.65s ease;
        }
        #login-loader.hidden {
            opacity: 0;
            transform: scale(1.03);
            pointer-events: none;
        }
        .ll-logo {
            width: 72px; height: 72px;
            border-radius: 20px;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; color: #fff;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            animation: ll-pulse 2s ease-in-out infinite;
        }
        @keyframes ll-pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); transform: scale(1); }
            50%      { box-shadow: 0 0 0 18px rgba(255,255,255,0); transform: scale(1.04); }
        }
        .ll-title { color: #fff; font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.02em; animation: ll-up 0.5s 0.2s ease both; }
        .ll-sub   { color: rgba(255,255,255,0.6); font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 36px; animation: ll-up 0.5s 0.35s ease both; }
        @keyframes ll-up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
        .ll-bar   { width: 160px; height: 2px; background: rgba(255,255,255,0.15); border-radius: 100px; overflow: hidden; animation: ll-up 0.4s 0.5s ease both; }
        .ll-fill  { height: 100%; width: 0; background: #fff; border-radius: 100px; animation: ll-grow 1.4s 0.55s ease-in-out forwards; }
        @keyframes ll-grow { 0% { width:0; } 100% { width:100%; } }

        /* ── Card Shell ── */
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            box-shadow:
                0 32px 80px rgba(16,185,129,0.12),
                0 8px 24px rgba(16,185,129,0.08),
                0 0 0 1px rgba(255,255,255,0.7) inset;
            width: 100%;
            max-width: 440px;
            opacity: 0;
            transform: translateY(32px) scale(0.96);
            transition: opacity 0.7s 0.05s ease, transform 0.7s 0.05s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .login-card.visible {
            opacity: 1;
            transform: none;
        }
        .login-card:hover {
            box-shadow:
                0 48px 100px rgba(16,185,129,0.18),
                0 16px 40px rgba(16,185,129,0.12),
                0 0 0 1px rgba(255,255,255,0.8) inset;
        }

        /* ── Brand mark ── */
        .brand-icon {
            width: 60px; height: 60px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 900; color: #fff;
            box-shadow: 0 12px 32px var(--glow), 0 0 0 6px rgba(16,185,129,0.1);
            margin-bottom: 20px;
            transition: transform 0.3s var(--ease-spring), box-shadow 0.3s ease;
            animation: brand-pulse 3s ease-in-out infinite;
        }
        .brand-icon:hover {
            transform: scale(1.08) rotate(-4deg);
            box-shadow: 0 18px 44px var(--glow-strong);
        }
        @keyframes brand-pulse {
            0%,100% { box-shadow: 0 12px 32px var(--glow), 0 0 0 6px rgba(16,185,129,0.1); }
            50%      { box-shadow: 0 16px 40px var(--glow-strong), 0 0 0 10px rgba(16,185,129,0.06); }
        }
        .brand-title {
            font-size: 1.65rem; font-weight: 800; color: var(--text); letter-spacing: -0.03em;
            margin: 0 0 4px;
        }
        .brand-sub {
            font-size: 0.88rem; color: var(--text-muted); margin: 0 0 28px;
        }

        /* ── Form ── */
        .form-label {
            color: var(--text-muted);
            font-size: 0.76rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 6px;
        }
        .form-control {
            background: rgba(248,250,252,0.9) !important;
            border: 1.5px solid rgba(16,185,129,0.18) !important;
            border-radius: 12px !important;
            color: var(--text) !important;
            padding: 0.8rem 1rem;
            font-size: 0.93rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .form-control::placeholder { color: var(--text-light) !important; }
        .form-control:focus {
            background: #fff !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(16,185,129,0.12) !important;
            transform: scale(1.008);
            outline: none;
        }

        /* ── Submit button ── */
        .btn-login {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0.85rem 1rem;
            width: 100%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 28px var(--glow);
            transition: transform 0.25s var(--ease-spring), box-shadow 0.25s ease, filter 0.2s ease;
            letter-spacing: 0.01em;
        }
        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.12);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .btn-login:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 18px 44px var(--glow-strong);
            filter: brightness(1.05);
        }
        .btn-login:hover::after { opacity: 1; }
        .btn-login:active {
            transform: translateY(0) scale(0.98);
            filter: brightness(0.97);
        }

        /* Ripple */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            transform: scale(0);
            animation: btn-ripple 0.55s linear;
            pointer-events: none;
        }
        @keyframes btn-ripple { to { transform: scale(4); opacity: 0; } }

        /* ── Alert ── */
        .alert-danger {
            background: rgba(239,68,68,0.06) !important;
            border: 1px solid rgba(239,68,68,0.2) !important;
            color: #DC2626 !important;
            border-radius: 10px !important;
            font-size: 0.875rem;
        }

        /* ── Field stagger ── */
        .field-group {
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .field-group.visible {
            opacity: 1;
            transform: none;
        }

        /* ── Floating particles ── */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: particle-float linear infinite;
        }
        @keyframes particle-float {
            0%   { opacity:0; transform:translateY(0) scale(0.5); }
            10%  { opacity:0.6; }
            90%  { opacity:0.3; }
            100% { opacity:0; transform:translateY(-100vh) scale(1.2); }
        }

        @media (max-width: 575px) {
            .login-card { padding: 2rem 1.5rem; border-radius: 20px; }
        }
    </style>
</head>
<body>

<!-- Animated BG -->
<div class="bg-canvas">
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
</div>

<!-- Loading Screen -->
<div id="login-loader">
    <div class="ll-logo">E</div>
    <div class="ll-title">Empatt</div>
    <div class="ll-sub">Secure Gateway</div>
    <div class="ll-bar"><div class="ll-fill"></div></div>
</div>

<!-- Login Card -->
<div class="login-card" id="loginCard">
    <div class="text-center">
        <div class="brand-icon">E</div>
        <h1 class="brand-title">Welcome Back</h1>
        <p class="brand-sub">Sign in to manage your workspace</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger p-3 mb-4 text-center">
        {% for field in form %}
            {% for error in field.errors %}{{ error }} {% endfor %}
        {% endfor %}
        {% for error in form.non_field_errors %}{{ error }}{% endfor %}
    </div>
    {% endif %}

    <form method="POST" id="loginForm">
        {% csrf_token %}

        <div class="mb-3 field-group" id="fg1">
            <label class="form-label">Username</label>
            <input id="id_username" type="text" name="username" class="form-control"
                   placeholder="Enter your username" required autocomplete="username">
        </div>

        <div class="mb-4 field-group" id="fg2">
            <label class="form-label">Password</label>
            <input id="id_password" type="password" name="password" class="form-control"
                   placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <div class="field-group" id="fg3">
            <button type="submit" class="btn-login" id="submitBtn">
                Sign In to Account
            </button>
        </div>
    </form>
</div>

<script>
(function() {
    /* ── Loader dismiss ── */
    const loader = document.getElementById('login-loader');
    const card   = document.getElementById('loginCard');

    function reveal() {
        loader.classList.add('hidden');
        setTimeout(function() {
            loader.style.display = 'none';
            card.classList.add('visible');
            // Stagger fields
            ['fg1','fg2','fg3'].forEach(function(id, i) {
                setTimeout(function() {
                    var el = document.getElementById(id);
                    if (el) el.classList.add('visible');
                }, 120 + i * 110);
            });
        }, 680);
    }

    if (document.readyState === 'complete') {
        setTimeout(reveal, 1350);
    } else {
        window.addEventListener('load', function() { setTimeout(reveal, 1350); });
    }

    /* ── Ripple ── */
    document.getElementById('submitBtn').addEventListener('click', function(e) {
        var btn    = this;
        var ripple = document.createElement('span');
        ripple.classList.add('ripple');
        var rect = btn.getBoundingClientRect();
        var size = Math.max(rect.width, rect.height);
        ripple.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(e.clientX-rect.left-size/2)+'px;top:'+(e.clientY-rect.top-size/2)+'px';
        btn.appendChild(ripple);
        setTimeout(function() { ripple.remove(); }, 600);
    });

    /* ── Floating particles ── */
    for (var p = 0; p < 14; p++) {
        (function() {
            var el = document.createElement('div');
            el.classList.add('particle');
            var size = 3 + Math.random() * 6;
            el.style.cssText = [
                'width:'  + size + 'px',
                'height:' + size + 'px',
                'left:'   + (Math.random()*100) + '%',
                'bottom:' + (-20) + 'px',
                'background: rgba(16,185,129,' + (0.25+Math.random()*0.4) + ')',
                'animation-duration:' + (6+Math.random()*10) + 's',
                'animation-delay:'    + (Math.random()*8) + 's'
            ].join(';');
            document.body.appendChild(el);
        })();
    }
})();
</script>
</body>
</html>
