{% extends 'base.html' %}

{% block title %}Remove Employee — Empatt{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 mt-5">
        <div class="card border-0 p-4 p-md-5 text-center confirm-card gs-reveal gs-reveal-scale">

            <!-- Danger icon -->
            <div class="mb-4" style="animation:danger-pulse 2s ease-in-out infinite;">
                <div style="width:72px;height:72px;border-radius:50%;background:rgba(239,68,68,0.1);border:1.5px solid rgba(239,68,68,0.25);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto;">
                    ⚠️
                </div>
            </div>

            <h2 class="fw-bold mb-2" style="color:var(--danger);letter-spacing:-0.02em;">Remove Employee?</h2>
            <p class="mb-4" style="color:var(--text-muted);font-size:0.95rem;line-height:1.6;">
                Are you absolutely sure you want to delete account
                <strong style="color:var(--text);">{{ employee.username }}</strong>?
                <br>This action <strong style="color:var(--danger);">cannot be undone.</strong>
            </p>

            <!-- Divider -->
            <div style="height:1px;background:rgba(239,68,68,0.15);margin-bottom:24px;"></div>

            <form method="POST">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'admin_dashboard' %}"
                       class="btn btn-secondary px-4 py-2 fw-semibold">
                        ← Go Back
                    </a>
                    <button type="submit"
                            class="btn btn-danger px-4 py-2 fw-bold">
                        🗑 Confirm Delete
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
@keyframes danger-pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
}
</style>
{% endblock %}
